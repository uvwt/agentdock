services:
  agentdock:
    image: agentdock:local
    build: .
    container_name: agentdock
    restart: unless-stopped
    ports:
      - "127.0.0.1:18766:8765"
    volumes:
      - ./workspace:/workspace
      - ./AgentDock:/agent-dock
    environment:
      AGENTDOCK_TOOL_PROFILE: "full"
      # AgentDock 是 MCP 自身控制层目录，和用户项目 workspace 分离。
      AGENTDOCK_DIR: "/agent-dock"
    command:
      - agentdock
      - --workspace
      - /workspace
      - --host
      - 0.0.0.0
      - --port
      - "8765"
      - --dangerously-skip-all-permissions

