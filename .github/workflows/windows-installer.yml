name: Windows Installer

on:
  push:
    branches:
      - main
    paths:
      - 'scripts/install-windows.ps1'
      - 'scripts/test-install-windows.ps1'
      - 'scripts/test-install-windows-download.ps1'
      - 'scripts/test-install-windows-e2e.ps1'
      - 'scripts/run-windows-installer-e2e-as-standard-user.ps1'
      - 'scripts/test-windows-current-binary-as-standard-user.ps1'
      - 'cmd/**'
      - 'internal/**'
      - 'go.mod'
      - 'go.sum'
      - '.github/workflows/windows-installer.yml'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  validate:
    name: Validate installer on Windows PowerShell 5.1
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Test Windows private storage
        shell: powershell
        run: |
          $ErrorActionPreference = 'Stop'
          go test ./internal/envstore ./internal/fs/securepath

      - name: Download and validate exact installer bytes
        shell: powershell
        run: |
          $ErrorActionPreference = 'Stop'
          $downloadedInstaller = Join-Path $env:RUNNER_TEMP 'install-windows-downloaded.ps1'
          $installerUrl = 'https://raw.githubusercontent.com/${{ github.repository }}/${{ github.sha }}/scripts/install-windows.ps1'
          & .\scripts\test-install-windows-download.ps1 `
            -Url $installerUrl `
            -ExpectedInstallerPath .\scripts\install-windows.ps1 `
            -OutputPath $downloadedInstaller
          "DOWNLOADED_INSTALLER=$downloadedInstaller" | Out-File -FilePath $env:GITHUB_ENV -Encoding ascii -Append

      - name: Run full install and in-place upgrade as standard user
        shell: powershell
        run: |
          $ErrorActionPreference = 'Stop'
          $releaseRoot = Join-Path $env:RUNNER_TEMP 'agentdock-current-release'
          $distRoot = Join-Path $releaseRoot 'dist'
          $bundleRoot = Join-Path $distRoot 'share\agentdock\core-skills'
          New-Item -ItemType Directory -Path $distRoot -Force | Out-Null

          $env:CGO_ENABLED = '0'
          $env:GOOS = 'windows'
          $env:GOARCH = 'amd64'
          go build -trimpath -o (Join-Path $distRoot 'agentdock.exe') .\cmd\agentdock
          python .\scripts\build-core-skill-bundle.py --output $bundleRoot

          $assetName = 'agentdock_windows_amd64.zip'
          $archivePath = Join-Path $releaseRoot $assetName
          Compress-Archive `
            -Path (Join-Path $distRoot 'agentdock.exe'), (Join-Path $distRoot 'share') `
            -DestinationPath $archivePath `
            -Force
          $hash = (Get-FileHash -LiteralPath $archivePath -Algorithm SHA256).Hash.ToLowerInvariant()
          [IO.File]::WriteAllText(
            "$archivePath.sha256",
            "$hash  $assetName`n",
            [Text.UTF8Encoding]::new($false)
          )

          $listener = [Net.Sockets.TcpListener]::new([Net.IPAddress]::Loopback, 0)
          $listener.Start()
          $port = ([Net.IPEndPoint] $listener.LocalEndpoint).Port
          $listener.Stop()
          $releaseBaseUrl = "http://127.0.0.1:$port"
          $server = Start-Process `
            -FilePath 'python' `
            -ArgumentList @('-m', 'http.server', $port, '--bind', '127.0.0.1', '--directory', $releaseRoot) `
            -WindowStyle Hidden `
            -PassThru
          try {
            $deadline = [DateTime]::UtcNow.AddSeconds(15)
            do {
              Start-Sleep -Milliseconds 250
              try {
                Invoke-WebRequest -UseBasicParsing -Uri "$releaseBaseUrl/$assetName.sha256" -TimeoutSec 2 | Out-Null
                break
              } catch {
                if ([DateTime]::UtcNow -ge $deadline) { throw }
              }
            } while ($true)

            & .\scripts\run-windows-installer-e2e-as-standard-user.ps1 `
              -InstallerPath $env:DOWNLOADED_INSTALLER `
              -Version latest `
              -ReleaseBaseUrl $releaseBaseUrl
          } finally {
            Stop-Process -Id $server.Id -Force -ErrorAction SilentlyContinue
          }

      - name: Build current Windows binary
        shell: powershell
        run: |
          $ErrorActionPreference = 'Stop'
          New-Item -ItemType Directory -Path dist -Force | Out-Null
          $env:CGO_ENABLED = '0'
          $env:GOOS = 'windows'
          $env:GOARCH = 'amd64'
          go build -trimpath -o dist\agentdock.exe .\cmd\agentdock

      - name: Smoke test current binary as standard user
        shell: powershell
        run: |
          $ErrorActionPreference = 'Stop'
          & .\scripts\test-windows-current-binary-as-standard-user.ps1 `
            -BinaryPath .\dist\agentdock.exe
