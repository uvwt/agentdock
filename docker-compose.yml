services:
  coding-tools-mcp-go:
    image: coding-tools-mcp-go:local
    build: .
    container_name: coding-tools-mcp-go
    restart: unless-stopped
    ports:
      - "127.0.0.1:18766:8765"
    volumes:
      - ./Project:/workspace
    environment:
      CODING_TOOLS_MCP_TOOL_PROFILE: "full"
      # Connector 配置放在 workspace 内，新增/修改 connector 不需要重建镜像。
      CODING_TOOLS_MCP_CONNECTOR_DIR: ".mcp/connectors"
    command:
      - coding-tools-mcp
      - --workspace
      - /workspace
      - --host
      - 0.0.0.0
      - --port
      - "8765"
      - --dangerously-skip-all-permissions

