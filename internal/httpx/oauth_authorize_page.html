<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="color-scheme" content="light dark">
  <title>连接 AgentDock</title>
  <style>
    :root {
      color-scheme: light;
      --page: #f5f5f4;
      --panel: #ffffff;
      --text: #1c1917;
      --muted: #78716c;
      --border: #d6d3d1;
      --border-strong: #a8a29e;
      --field: #ffffff;
      --button: #1c1917;
      --button-hover: #292524;
      --button-text: #ffffff;
      --error: #b42318;
      --error-bg: #fff6f5;
      --error-border: #f3b7b2;
      --focus: rgba(28, 25, 23, 0.16);
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      min-height: 100%;
    }

    body {
      margin: 0;
      display: grid;
      place-items: center;
      padding: 24px;
      background: var(--page);
      color: var(--text);
      font-family: ui-sans-serif, -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Hiragino Sans GB", sans-serif;
      -webkit-font-smoothing: antialiased;
    }

    .shell {
      width: min(100%, 420px);
    }

    .product {
      display: flex;
      align-items: center;
      gap: 10px;
      margin: 0 0 14px 2px;
      color: var(--text);
      font-size: 14px;
      font-weight: 650;
    }

    .product-mark {
      display: grid;
      place-items: center;
      width: 28px;
      height: 28px;
      border: 1px solid var(--border-strong);
      border-radius: 7px;
      background: var(--panel);
    }

    .product-mark svg {
      width: 15px;
      height: 15px;
    }

    .panel {
      padding: 28px;
      border: 1px solid var(--border);
      border-radius: 12px;
      background: var(--panel);
      box-shadow: 0 1px 2px rgba(28, 25, 23, 0.04);
    }

    h1 {
      margin: 0;
      font-size: 22px;
      line-height: 1.3;
      letter-spacing: -0.02em;
    }

    .subtitle {
      margin: 8px 0 22px;
      color: var(--muted);
      font-size: 14px;
      line-height: 1.55;
    }

    .destination {
      margin-bottom: 20px;
      padding: 12px 14px;
      border: 1px solid var(--border);
      border-radius: 8px;
      background: var(--page);
    }

    .destination span {
      display: block;
      margin-bottom: 5px;
      color: var(--muted);
      font-size: 12px;
    }

    .destination code {
      display: block;
      overflow-wrap: anywhere;
      color: var(--text);
      font: 12px/1.5 ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace;
    }

    .alert {
      display: flex;
      align-items: flex-start;
      gap: 8px;
      margin: 0 0 16px;
      padding: 10px 12px;
      border: 1px solid var(--error-border);
      border-radius: 8px;
      background: var(--error-bg);
      color: var(--error);
      font-size: 13px;
      line-height: 1.45;
    }

    .alert svg {
      flex: 0 0 auto;
      width: 16px;
      height: 16px;
      margin-top: 1px;
    }

    label {
      display: block;
      margin-bottom: 7px;
      font-size: 13px;
      font-weight: 600;
    }

    input[type="password"] {
      width: 100%;
      height: 42px;
      padding: 0 12px;
      border: 1px solid var(--border-strong);
      border-radius: 8px;
      outline: none;
      background: var(--field);
      color: var(--text);
      font: inherit;
    }

    input[type="password"]::placeholder {
      color: var(--muted);
    }

    input[type="password"]:focus {
      border-color: var(--text);
      box-shadow: 0 0 0 3px var(--focus);
    }

    button {
      width: 100%;
      height: 42px;
      margin-top: 12px;
      border: 1px solid var(--button);
      border-radius: 8px;
      background: var(--button);
      color: var(--button-text);
      cursor: pointer;
      font: inherit;
      font-size: 14px;
      font-weight: 650;
    }

    button:hover {
      background: var(--button-hover);
    }

    button:focus-visible {
      outline: 3px solid var(--focus);
      outline-offset: 2px;
    }

    .note {
      margin: 16px 0 0;
      color: var(--muted);
      font-size: 12px;
      line-height: 1.55;
    }

    @media (max-width: 520px) {
      body {
        display: block;
        padding: 20px 16px;
      }

      .shell {
        margin: 12vh auto 0;
      }

      .panel {
        padding: 24px 20px;
      }
    }

    @media (prefers-color-scheme: dark) {
      :root {
        color-scheme: dark;
        --page: #191817;
        --panel: #242321;
        --text: #f5f5f4;
        --muted: #a8a29e;
        --border: #44403c;
        --border-strong: #57534e;
        --field: #1c1b1a;
        --button: #f5f5f4;
        --button-hover: #e7e5e4;
        --button-text: #1c1917;
        --error: #fda29b;
        --error-bg: #3b201f;
        --error-border: #7a3530;
        --focus: rgba(245, 245, 244, 0.16);
      }
    }
  </style>
</head>
<body>
  <main class="shell">
    <div class="product">
      <span class="product-mark" aria-hidden="true">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
          <path d="M7 10V8a5 5 0 0 1 10 0v2"/>
          <rect x="5" y="10" width="14" height="10" rx="2"/>
          <path d="M12 14v2"/>
        </svg>
      </span>
      <span>AgentDock</span>
    </div>

    <section class="panel" aria-labelledby="page-title">
      <h1 id="page-title">连接到 AgentDock</h1>
      <p class="subtitle">输入服务器密码以批准这次连接。</p>

      <div class="destination">
        <span>授权完成后返回</span>
        <code>{{.RedirectURI}}</code>
      </div>

      {{if .Error}}
      <div class="alert" role="alert">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <circle cx="12" cy="12" r="9"/>
          <path d="M12 8v5M12 16.5h.01"/>
        </svg>
        <span id="password-error">{{.Error}}</span>
      </div>
      {{end}}

      <form method="post" autocomplete="on">
        <input type="hidden" name="response_type" value="{{.ResponseType}}">
        <input type="hidden" name="client_id" value="{{.ClientID}}">
        <input type="hidden" name="redirect_uri" value="{{.RedirectURI}}">
        <input type="hidden" name="code_challenge" value="{{.CodeChallenge}}">
        <input type="hidden" name="code_challenge_method" value="{{.CodeChallengeMethod}}">
        <input type="hidden" name="resource" value="{{.Resource}}">
        <input type="hidden" name="state" value="{{.State}}">

        <label for="password">服务器密码</label>
        <input id="password" type="password" name="password" placeholder="输入密码" autocomplete="current-password" required autofocus{{if .Error}} aria-invalid="true" aria-describedby="password-error"{{end}}>
        <button type="submit">继续</button>
      </form>

      <p class="note">仅在你主动发起连接时继续。</p>
    </section>
  </main>
</body>
</html>
