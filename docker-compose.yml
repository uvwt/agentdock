services:
  coding-tools-mcp-go:
    image: coding-tools-mcp-go:local
    build: .
    container_name: coding-tools-mcp-go
    restart: unless-stopped
    ports:
      - "127.0.0.1:18766:8765"
    volumes:
      - ./Project:/workspace
      - ./AgentDock:/agent-dock
    environment:
      CODING_TOOLS_MCP_TOOL_PROFILE: "full"
      # AgentDock 是 MCP 自身控制层目录，和用户项目 workspace 分离。
      CODING_TOOLS_MCP_AGENT_DOCK_DIR: "/agent-dock"
    command:
      - coding-tools-mcp
      - --workspace
      - /workspace
      - --host
      - 0.0.0.0
      - --port
      - "8765"
      - --dangerously-skip-all-permissions

