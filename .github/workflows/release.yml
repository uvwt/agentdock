name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag, for example v0.1.0'
        required: true
        type: string

permissions:
  contents: write
  packages: write

jobs:
  build-linux:
    name: Build Linux ${{ matrix.goarch }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        goarch: [amd64, arm64]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Build and package
        env:
          CGO_ENABLED: '0'
          GOOS: linux
          GOARCH: ${{ matrix.goarch }}
        run: |
          set -euo pipefail
          asset="agentdock_linux_${GOARCH}.tar.gz"
          build_date="$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          mkdir -p dist/bin
          go build -trimpath \
            -ldflags="-s -w -X github.com/uvwt/agentdock/cmd/agentdock/internal/buildinfo.Commit=${GITHUB_SHA} -X github.com/uvwt/agentdock/cmd/agentdock/internal/buildinfo.BuildDate=${build_date}" \
            -o dist/bin/agentdock ./cmd/agentdock
          python3 scripts/build-core-skill-bundle.py --output dist/share/agentdock/core-skills
          tar -C dist -czf "$asset" bin/agentdock share/agentdock/core-skills
          shasum -a 256 "$asset" > "$asset.sha256"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: agentdock-linux-${{ matrix.goarch }}
          path: |
            agentdock_linux_${{ matrix.goarch }}.tar.gz
            agentdock_linux_${{ matrix.goarch }}.tar.gz.sha256
          if-no-files-found: error

  build-macos:
    name: Build macOS ${{ matrix.goarch }}
    runs-on: macos-latest
    strategy:
      fail-fast: false
      matrix:
        goarch: [amd64, arm64]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Validate macOS scripts
        run: |
          for path in \
            scripts/install-macos.sh \
            scripts/uninstall-macos.sh \
            scripts/sign-macos.sh \
            scripts/deploy-macos-source.sh \
            scripts/restart-macos.sh; do
            zsh -n "$path"
          done
          ./scripts/test-install-macos.sh

      - name: Build and package
        env:
          CGO_ENABLED: '0'
          GOOS: darwin
          GOARCH: ${{ matrix.goarch }}
        run: |
          set -euo pipefail
          asset="agentdock_darwin_${GOARCH}.tar.gz"
          build_date="$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          mkdir -p dist/bin
          go build -trimpath \
            -ldflags="-s -w -X github.com/uvwt/agentdock/cmd/agentdock/internal/buildinfo.Commit=${GITHUB_SHA} -X github.com/uvwt/agentdock/cmd/agentdock/internal/buildinfo.BuildDate=${build_date}" \
            -o dist/bin/agentdock ./cmd/agentdock
          python3 scripts/build-core-skill-bundle.py --output dist/share/agentdock/core-skills
          tar -C dist -czf "$asset" bin/agentdock share/agentdock/core-skills
          shasum -a 256 "$asset" > "$asset.sha256"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: agentdock-macos-${{ matrix.goarch }}
          path: |
            agentdock_darwin_${{ matrix.goarch }}.tar.gz
            agentdock_darwin_${{ matrix.goarch }}.tar.gz.sha256
          if-no-files-found: error

  build-windows:
    name: Build Windows ${{ matrix.goarch }}
    runs-on: windows-latest
    strategy:
      fail-fast: false
      matrix:
        goarch: [amd64, arm64]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Test Windows private storage
        shell: powershell
        run: |
          $ErrorActionPreference = 'Stop'
          go test ./internal/envstore ./internal/fs/securepath

      - name: Download and validate exact installer bytes
        shell: powershell
        run: |
          $ErrorActionPreference = 'Stop'
          $downloadedInstaller = Join-Path $env:RUNNER_TEMP 'install-windows-downloaded.ps1'
          $installerUrl = 'https://raw.githubusercontent.com/${{ github.repository }}/${{ github.sha }}/scripts/install-windows.ps1'
          & .\scripts\test-install-windows-download.ps1 `
            -Url $installerUrl `
            -ExpectedInstallerPath .\scripts\install-windows.ps1 `
            -OutputPath $downloadedInstaller
          "DOWNLOADED_INSTALLER=$downloadedInstaller" | Out-File -FilePath $env:GITHUB_ENV -Encoding ascii -Append

      - name: Validate downloaded installer
        shell: powershell
        run: |
          $ErrorActionPreference = 'Stop'
          & .\scripts\test-install-windows.ps1 -InstallerPath $env:DOWNLOADED_INSTALLER

      - name: Detect Authenticode configuration
        id: signing
        shell: pwsh
        env:
          WINDOWS_SIGNING_CERT_BASE64: ${{ secrets.WINDOWS_SIGNING_CERT_BASE64 }}
        run: |
          $enabled = -not [string]::IsNullOrWhiteSpace($env:WINDOWS_SIGNING_CERT_BASE64)
          "enabled=$($enabled.ToString().ToLowerInvariant())" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append

      - name: Build
        shell: pwsh
        env:
          CGO_ENABLED: '0'
          GOOS: windows
          GOARCH: ${{ matrix.goarch }}
        run: |
          $ErrorActionPreference = 'Stop'
          $buildDate = [DateTime]::UtcNow.ToString('yyyy-MM-ddTHH:mm:ssZ')
          $ldflags = "-s -w -X github.com/uvwt/agentdock/cmd/agentdock/internal/buildinfo.Commit=$env:GITHUB_SHA -X github.com/uvwt/agentdock/cmd/agentdock/internal/buildinfo.BuildDate=$buildDate"
          New-Item -ItemType Directory -Path dist -Force | Out-Null
          go build -trimpath -ldflags $ldflags -o dist/agentdock.exe ./cmd/agentdock

      - name: Smoke test current binary as standard user
        if: matrix.goarch == 'amd64'
        shell: powershell
        run: |
          $ErrorActionPreference = 'Stop'
          & .\scripts\test-windows-current-binary-as-standard-user.ps1 `
            -BinaryPath .\dist\agentdock.exe

      - name: Authenticode sign
        if: steps.signing.outputs.enabled == 'true'
        shell: pwsh
        env:
          WINDOWS_SIGNING_CERT_BASE64: ${{ secrets.WINDOWS_SIGNING_CERT_BASE64 }}
          WINDOWS_SIGNING_CERT_PASSWORD: ${{ secrets.WINDOWS_SIGNING_CERT_PASSWORD }}
        run: |
          $ErrorActionPreference = 'Stop'
          $pfx = Join-Path $env:RUNNER_TEMP 'agentdock-signing.pfx'
          [IO.File]::WriteAllBytes($pfx, [Convert]::FromBase64String($env:WINDOWS_SIGNING_CERT_BASE64))
          try {
            $signTool = Get-ChildItem "${env:ProgramFiles(x86)}\Windows Kits\10\bin\*\x64\signtool.exe" |
              Sort-Object FullName |
              Select-Object -Last 1
            if (-not $signTool) { throw 'signtool.exe was not found' }
            & $signTool.FullName sign /fd SHA256 /f $pfx /p $env:WINDOWS_SIGNING_CERT_PASSWORD /tr http://timestamp.digicert.com /td SHA256 dist/agentdock.exe
            if ($LASTEXITCODE -ne 0) { throw "signtool failed with exit code $LASTEXITCODE" }
          }
          finally {
            Remove-Item -LiteralPath $pfx -Force -ErrorAction SilentlyContinue
          }

      - name: Package
        shell: pwsh
        env:
          GOARCH: ${{ matrix.goarch }}
        run: |
          $ErrorActionPreference = 'Stop'
          $asset = "agentdock_windows_$env:GOARCH.zip"
          python .\scripts\build-core-skill-bundle.py --output dist\share\agentdock\core-skills
          Compress-Archive -Path dist\agentdock.exe, dist\share -DestinationPath $asset -Force
          $hash = (Get-FileHash -LiteralPath $asset -Algorithm SHA256).Hash.ToLowerInvariant()
          [IO.File]::WriteAllText("$asset.sha256", "$hash  $asset`n", [Text.UTF8Encoding]::new($false))

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: agentdock-windows-${{ matrix.goarch }}
          path: |
            agentdock_windows_${{ matrix.goarch }}.zip
            agentdock_windows_${{ matrix.goarch }}.zip.sha256
          if-no-files-found: error

  publish:
    name: Publish GitHub Release
    needs: [build-linux, build-macos, build-windows]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Package installers and versioned Compose files
        shell: bash
        env:
          RELEASE_TAG: ${{ github.event.inputs.tag || github.ref_name }}
          RELEASE_REPOSITORY: ${{ github.repository }}
        run: |
          set -euo pipefail
          cp scripts/install-linux.sh dist/install-linux.sh
          cp scripts/install-linux-bootstrap.sh dist/install-linux-bootstrap.sh
          cp scripts/install-macos.sh dist/install-macos.sh
          cp scripts/uninstall-macos.sh dist/uninstall-macos.sh
          cp scripts/install-windows.ps1 dist/install-windows.ps1
          cp scripts/uninstall-windows.ps1 dist/uninstall-windows.ps1
          python3 - <<'PY'
          import os
          import re
          import zipfile
          from pathlib import Path

          tag = os.environ["RELEASE_TAG"]
          repository = os.environ["RELEASE_REPOSITORY"].lower()
          expected_version = tag.removeprefix("v")
          config_source = Path("internal/config/config.go").read_text()
          version_match = re.search(r'^\s*Version\s*=\s*"([^"]+)"', config_source, re.MULTILINE)
          if version_match is None:
              raise SystemExit("could not read config.Version from internal/config/config.go")
          actual_version = version_match.group(1)
          if actual_version != expected_version:
              raise SystemExit(f"release tag {tag} does not match config.Version {actual_version}")

          runtime = Path("docker-compose.yml").read_text()
          browser = Path("docker-compose.browser.yml").read_text()
          runtime = runtime.replace("ghcr.io/uvwt/agentdock:latest", f"ghcr.io/{repository}:{tag}")
          browser = browser.replace("ghcr.io/uvwt/agentdock:browser-latest", f"ghcr.io/{repository}:browser-{tag}")
          Path("dist/docker-compose.yml").write_text(runtime)
          Path("dist/docker-compose.browser.yml").write_text(browser)

          skill_root = Path("skill-sources/desktop")
          with zipfile.ZipFile("dist/skill-desktop.zip", "w", zipfile.ZIP_DEFLATED) as archive:
              for path in sorted(skill_root.rglob("*")):
                  if path.is_file():
                      archive.write(path, path.relative_to(skill_root))
          PY
          (
            cd dist
            for file in \
              install-linux.sh \
              install-linux-bootstrap.sh \
              install-macos.sh \
              uninstall-macos.sh \
              install-windows.ps1 \
              uninstall-windows.ps1 \
              skill-desktop.zip; do
              shasum -a 256 "$file" > "$file.sha256"
            done
          )

      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.inputs.tag || github.ref_name }}
          files: |
            dist/*.tar.gz
            dist/*.tar.gz.sha256
            dist/*.zip
            dist/*.zip.sha256
            dist/*.sh
            dist/*.sh.sha256
            dist/*.ps1
            dist/*.ps1.sha256
            dist/*.yml
          generate_release_notes: true

  publish-container:
    name: Publish container (${{ matrix.variant }})
    needs: publish
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - variant: runtime
            target: runtime
            latest_tag: latest
            tag_prefix: ''
          - variant: dev
            target: dev
            latest_tag: dev-latest
            tag_prefix: dev-
          - variant: browser
            target: browser
            latest_tag: browser-latest
            tag_prefix: browser-
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup QEMU
        uses: docker/setup-qemu-action@v3

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Prepare image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: |
            ghcr.io/${{ github.repository }}
            agentdockio/agentdock
          flavor: latest=false
          tags: |
            type=raw,value=${{ matrix.tag_prefix }}${{ github.event.inputs.tag || github.ref_name }},priority=1000
            type=raw,value=${{ matrix.latest_tag }},priority=100

      - name: Prepare image build metadata
        id: build
        shell: bash
        run: echo "date=$(date -u +%Y-%m-%dT%H:%M:%SZ)" >> "$GITHUB_OUTPUT"

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          target: ${{ matrix.target }}
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            BUILD_COMMIT=${{ github.sha }}
            BUILD_DATE=${{ steps.build.outputs.date }}
          cache-from: type=gha,scope=${{ matrix.variant }}
          cache-to: type=gha,mode=max,scope=${{ matrix.variant }}

  verify-linux-release:
    name: Verify published Linux installer
    needs: publish
    runs-on: ubuntu-latest
    steps:
      - name: Download and run published installer
        shell: bash
        env:
          RELEASE_TAG: ${{ github.event.inputs.tag || github.ref_name }}
        run: |
          set -euo pipefail
          installer="$RUNNER_TEMP/install-linux.sh"
          install_dir="$RUNNER_TEMP/agentdock-install"
          data_dir="$RUNNER_TEMP/agentdock-data"
          env_file="$RUNNER_TEMP/agentdock.env"
          curl -fL "https://github.com/${{ github.repository }}/releases/download/$RELEASE_TAG/install-linux.sh" -o "$installer"
          curl -fL "https://github.com/${{ github.repository }}/releases/download/$RELEASE_TAG/install-linux.sh.sha256" -o "$installer.sha256"
          (
            cd "$RUNNER_TEMP"
            sha256sum -c install-linux.sh.sha256
          )
          AGENTDOCK_NONINTERACTIVE=true \
          AGENTDOCK_INSTALL_MODE=binary \
          AGENTDOCK_RELEASE_VERSION="$RELEASE_TAG" \
          AGENTDOCK_SOURCE_DIR="$install_dir" \
          AGENTDOCK_DATA_DIR="$data_dir" \
          AGENTDOCK_ENV_FILE="$env_file" \
          AGENTDOCK_SERVICE_MANAGER=none \
          AGENTDOCK_SERVICE_USER="$(id -un)" \
          AGENTDOCK_AUTH_TOKEN=test-token \
            bash "$installer"
          "$install_dir/bin/agentdock" --help >/dev/null 2>&1
          test -f "$data_dir/.agentdock/skill-store/bundled-skills.json"
          for skill in skill-authoring skill-installation skill-vetter-runtime; do
            state="$data_dir/.agentdock/skill-store/state/$skill.json"
            version="$(jq -r .active_version "$state")"
            test -n "$version"
            test -f "$data_dir/.agentdock/skill-store/installed/$skill/$version/SKILL.md"
          done

  verify-macos-release:
    name: Verify published macOS installer
    needs: publish
    runs-on: macos-latest
    steps:
      - name: Download and run published installer
        shell: zsh {0}
        run: |
          set -euo pipefail
          tag='${{ github.event.inputs.tag || github.ref_name }}'
          installer="$RUNNER_TEMP/install-macos.sh"
          uninstaller="$RUNNER_TEMP/uninstall-macos.sh"
          curl -fL "https://github.com/${{ github.repository }}/releases/download/$tag/install-macos.sh" -o "$installer"
          curl -fL "https://github.com/${{ github.repository }}/releases/download/$tag/uninstall-macos.sh" -o "$uninstaller"
          zsh -n "$installer"
          zsh -n "$uninstaller"
          HOME="$RUNNER_TEMP/home" \
          AGENTDOCK_INSTALL_DIR="$RUNNER_TEMP/bin" \
            zsh "$installer" --version "$tag"
          "$RUNNER_TEMP/bin/agentdock" --help >/dev/null 2>&1
          test -f "$RUNNER_TEMP/home/.agentdock/skill-store/bundled-skills.json"
          for skill in skill-authoring skill-installation skill-vetter-runtime; do
            state="$RUNNER_TEMP/home/.agentdock/skill-store/state/$skill.json"
            version="$(python3 -c 'import json,sys; print(json.load(open(sys.argv[1]))["active_version"])' "$state")"
            test -f "$RUNNER_TEMP/home/.agentdock/skill-store/installed/$skill/$version/SKILL.md"
          done

  verify-windows-release:
    name: Verify published Windows installer
    needs: publish
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download published installer
        shell: powershell
        run: |
          $ErrorActionPreference = 'Stop'
          $tag = '${{ github.event.inputs.tag || github.ref_name }}'
          $downloadedInstaller = Join-Path $env:RUNNER_TEMP 'install-windows-release.ps1'
          $installerUrl = "https://github.com/${{ github.repository }}/releases/download/$tag/install-windows.ps1"
          & .\scripts\test-install-windows-download.ps1 `
            -Url $installerUrl `
            -ExpectedInstallerPath .\scripts\install-windows.ps1 `
            -OutputPath $downloadedInstaller
          "DOWNLOADED_INSTALLER=$downloadedInstaller" | Out-File -FilePath $env:GITHUB_ENV -Encoding ascii -Append
          "RELEASE_TAG=$tag" | Out-File -FilePath $env:GITHUB_ENV -Encoding ascii -Append

      - name: Install and upgrade published version as standard user
        shell: powershell
        run: |
          $ErrorActionPreference = 'Stop'
          & .\scripts\run-windows-installer-e2e-as-standard-user.ps1 `
            -InstallerPath $env:DOWNLOADED_INSTALLER `
            -Version $env:RELEASE_TAG

  verify-desktop-skill-release:
    name: Verify published Desktop Skill
    needs: publish
    runs-on: ubuntu-latest
    steps:
      - name: Download and inspect published Skill package
        shell: bash
        env:
          RELEASE_TAG: ${{ github.event.inputs.tag || github.ref_name }}
        run: |
          set -euo pipefail
          base="https://github.com/${{ github.repository }}/releases/download/$RELEASE_TAG"
          curl -fL "$base/skill-desktop.zip" -o skill-desktop.zip
          curl -fL "$base/skill-desktop.zip.sha256" -o skill-desktop.zip.sha256
          sha256sum -c skill-desktop.zip.sha256
          mapfile -t files < <(unzip -Z1 skill-desktop.zip | sort)
          expected=(SKILL.md run.py)
          test "${files[*]}" = "${expected[*]}"
          unzip -p skill-desktop.zip SKILL.md | grep -q '^name: desktop$'

  verify-container:
    name: Verify published containers
    needs: publish-container
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Run published GHCR images
        env:
          RELEASE_TAG: ${{ github.event.inputs.tag || github.ref_name }}
          AGENTDOCK_TEST_BUILD: "false"
          AGENTDOCK_TEST_RUNTIME_IMAGE: ghcr.io/${{ github.repository }}:${{ github.event.inputs.tag || github.ref_name }}
          AGENTDOCK_TEST_DEV_IMAGE: ghcr.io/${{ github.repository }}:dev-${{ github.event.inputs.tag || github.ref_name }}
          AGENTDOCK_TEST_BROWSER_IMAGE: ghcr.io/${{ github.repository }}:browser-${{ github.event.inputs.tag || github.ref_name }}
          AGENTDOCK_EXPECT_IMAGE_VERSION: ${{ github.event.inputs.tag || github.ref_name }}
        run: ./scripts/test-docker-images.sh

      - name: Run published Docker Hub images
        env:
          RELEASE_TAG: ${{ github.event.inputs.tag || github.ref_name }}
          AGENTDOCK_TEST_BUILD: "false"
          AGENTDOCK_TEST_RUNTIME_IMAGE: agentdockio/agentdock:${{ github.event.inputs.tag || github.ref_name }}
          AGENTDOCK_TEST_DEV_IMAGE: agentdockio/agentdock:dev-${{ github.event.inputs.tag || github.ref_name }}
          AGENTDOCK_TEST_BROWSER_IMAGE: agentdockio/agentdock:browser-${{ github.event.inputs.tag || github.ref_name }}
          AGENTDOCK_EXPECT_IMAGE_VERSION: ${{ github.event.inputs.tag || github.ref_name }}
        run: ./scripts/test-docker-images.sh
